name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Run engine tests
        run: npm test

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        env:
          # Dummy values for build — auth/db not needed at build time
          AUTH_SECRET: ci-build-dummy
          TURSO_DATABASE_URL: libsql://dummy.turso.io
          TURSO_AUTH_TOKEN: dummy
        run: npx next build
